<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Gopzzz! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <!-- Confetti & Fireworks Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 🎵 Music Player -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- 🏠 1. Welcome Screen -->
    <section id="welcomeScreen" class="screen active">
        <div class="floating-balloons">🎈🎈🎈</div>
        <h1>Ready for your surprise?</h1>
        <button id="startBtn">Let's Go 🎵</button>
    </section>

    <!-- 🎁 3. Interactive Gift Box -->
    <section id="giftScreen" class="screen hidden">
        <h2>Tap to open your gift!</h2>
        <div id="giftBox" class="emoji-btn">🎁</div>
    </section>

    <!-- 💌 4. Typewriter Letter -->
    <section id="letterScreen" class="screen hidden">
        <div class="letter-container">
            <p id="typewriterText"></p>
        </div>
        <button id="nextToGallery" class="hidden">See Our Memories 📸</button>
    </section>

    <!-- 📸 5. Photo Gallery Slideshow -->
    <section id="galleryScreen" class="screen hidden">
        <h2>My Favorite Moments</h2>
        <div class="slideshow">
            <!-- Ensure your first photo is named photo1.jpg -->
            <img id="slideImg" src="photo1.jpg" alt="Memory">
        </div>
        <div class="controls">
            <button id="prevBtn">⬅️</button>
            <button id="nextBtn">➡️</button>
        </div>
        <button id="finalBtn">One Last Surprise ✨</button>
    </section>

    <!-- ✨ 7. Final Surprise & Cake -->
    <section id="finalScreen" class="screen hidden">
        <div id="cake" class="emoji-btn">🎂</div>
        <h1 class="glow-text">Happy Birthday Gopzzz ❤️</h1>
        <p>Tap the cake for fireworks!</p>
        <div class="hearts">💖💖💖</div>
    </section>

    <script src="script.js"></script>
</body>
</html>
